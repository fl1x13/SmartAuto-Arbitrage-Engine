name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests
        run: pytest tests/ -v

      - name: Smoke — scraper pipeline (demo mode)
        run: python -m scraper.runner --pages 3

      - name: Smoke — model training
        run: python -m model.train
